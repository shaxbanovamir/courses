<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Все курсы — Librarium</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async></script>
    <style>
        .courses-page {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            gap: 2rem;
            min-height: 80vh;
        }
        .courses-sidebar {
            width: 280px;
            flex-shrink: 0;
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 80px;
            height: fit-content;
        }
        .courses-sidebar h3 {
            margin-bottom: 1rem;
            color: #581c87;
        }
        .filter-group {
            margin-bottom: 1.5rem;
        }
        .filter-group h4 {
            margin-bottom: 0.5rem;
            color: #1f2937;
        }
        .filter-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .filter-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #6b21a5;
        }
        .reset-filters-btn {
            width: 100%;
            background: #f5f3f7;
            border: 1px solid #e5e7eb;
            padding: 0.6rem;
            border-radius: 0.5rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .courses-content {
            flex: 1;
        }
        .courses-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .courses-header h2 {
            color: #581c87;
        }
        .search-mini {
            width: 280px;
        }
        .search-mini input {
            width: 100%;
            padding: 0.6rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 2rem;
            outline: none;
        }
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .course-card {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .course-image {
            height: 100px;
            background: linear-gradient(135deg, #9333ea, #581c87);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        .course-content {
            padding: 1rem;
        }
        .course-title {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }
        .course-author {
            font-size: 0.7rem;
            color: #6b7280;
        }
        .course-category {
            font-size: 0.7rem;
            color: #6b21a5;
            margin: 0.25rem 0;
        }
        .course-price {
            font-size: 0.8rem;
            font-weight: bold;
            margin: 0.5rem 0;
        }
        .price-free-tag { color: #10b981; }
        .price-paid-tag { color: #f59e0b; }
        .course-description {
            font-size: 0.75rem;
            color: #4b5563;
            margin-bottom: 0.75rem;
        }
        .btn-subscribe {
            background: #6b21a5;
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            width: 100%;
        }
        .btn-subscribed {
            background: #10b981;
        }
        .unsubscribe-btn {
            background: #ef4444;
            margin-top: 0.5rem;
        }
        .empty-courses-message {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 1rem;
        }
        @media (max-width: 768px) {
            .courses-page { flex-direction: column; }
            .courses-sidebar { width: 100%; position: static; }
        }
    </style>
</head>

            { id: 48, title: "Английский для IT", author: "Елена Козлова", description: "Технический английский.", icon: "🇬🇧", category: "programming", price: "free" },
            { id: 49, title: "Собеседование в IT", author: "Иван Иванов", description: "Подготовка к интервью.", icon: "🎤", category: "programming", price: "free" },
            { id: 50, title: "Блокчейн и Web3", author: "Антон Белов", description: "Смарт-контракты.", icon: "⛓️", category: "programming", price: "paid" },
            { id: 51, title: "Кибербезопасность", author: "Сергей Крылов", description: "Сети, шифрование.", icon: "🔒", category: "programming", price: "free" },
            { id: 52, title: "Алгоритмы", author: "Дмитрий Соколов", description: "Сортировки, деревья.", icon: "🧩", category: "programming", price: "free" }

        function getSubscribed() { return JSON.parse(localStorage.getItem("subscribedCourses") || "[]"); }
        function saveSubscribed(subs) { localStorage.setItem("subscribedCourses", JSON.stringify(subs)); }
        function isSubscribed(id) { return getSubscribed().includes(id); }
        function subscribeToCourse(id) {
            let subs = getSubscribed();
            if (!subs.includes(id)) subs.push(id);
            else subs = subs.filter(i => i !== id);
            saveSubscribed(subs);
            renderAllCourses();
        }
        function getCategoryName(cat) {
            const names = { programming:"Программирование", web:"Веб-разработка", python:"Python", js:"JavaScript", cpp:"C++", csharp:"C#", design:"Дизайн", marketing:"Маркетинг", ai:"AI & ML", mobile:"Мобильная разработка", devops:"DevOps", data:"Data Science" };
            return names[cat] || cat;
        }
        function renderAllCourses() {
            const container = document.getElementById("allCoursesContainer");
            if (!container) return;
            let filtered = [...courses];
            const selectedCats = [], selectedPrices = [];
            document.querySelectorAll('[data-category]').forEach(cb => { if(cb.checked && cb.dataset.category !== "all") selectedCats.push(cb.dataset.category); });
            document.querySelectorAll('[data-price]').forEach(cb => { if(cb.checked) selectedPrices.push(cb.dataset.price); });
            if(selectedCats.length) filtered = filtered.filter(c => selectedCats.includes(c.category));
            if(selectedPrices.length) filtered = filtered.filter(c => selectedPrices.includes(c.price));
            const search = document.getElementById("coursesSearchInput");
            if(search && search.value.trim()) {
                const term = search.value.toLowerCase();
                filtered = filtered.filter(c => c.title.toLowerCase().includes(term));
            }
            if(filtered.length === 0) { container.innerHTML = `<div class="empty-courses-message">😢 Курсов не найдено</div>`; return; }
            container.innerHTML = filtered.map(c => `
                <div class="course-card">
                    <div class="course-image">${c.icon}</div>
                    <div class="course-content">
                        <h3 class="course-title">${c.title}</h3>
                        <div class="course-author">👨‍🏫 ${c.author}</div>
                        <div class="course-category">📁 ${getCategoryName(c.category)}</div>
                        <div class="course-price ${c.price === 'free' ? 'price-free-tag' : 'price-paid-tag'}">${c.price === 'free' ? '🆓 Бесплатно' : '💎 Платный'}</div>
                        <p class="course-description">${c.description}</p>
                        <button class="btn-subscribe ${isSubscribed(c.id) ? 'btn-subscribed' : ''}" onclick="subscribeToCourse(${c.id})">${isSubscribed(c.id) ? '✓ Записан' : '📚 Записаться'}</button>
                        ${isSubscribed(c.id) ? `<button class="btn-subscribe unsubscribe-btn" onclick="subscribeToCourse(${c.id})">❌ Отписаться</button>` : ''}
                    </div>
                </div>
            `).join("");
        }
        function setupFilters() {
            document.querySelectorAll('.filter-checkbox input').forEach(cb => cb.addEventListener('change', () => renderAllCourses()));
            document.getElementById("resetFiltersBtn")?.addEventListener('click', () => {
                document.querySelectorAll('.filter-checkbox input').forEach(cb => cb.checked = false);
                document.querySelector('[data-category="all"]').checked = true;
                const search = document.getElementById("coursesSearchInput");
                if(search) search.value = '';
                renderAllCourses();
            });
            document.getElementById("coursesSearchInput")?.addEventListener('input', () => renderAllCourses());
            renderAllCourses();
        }
        // Google Auth
        const GOOGLE_CLIENT_ID = "258425274420-02l9je5d15qkmsr45sa42cq54nn5dub4.apps.googleusercontent.com";
        function parseJwt(t) { let b=t.split('.')[1]; return JSON.parse(atob(b.replace(/-/g,'+').replace(/_/g,'/'))); }
        function updateUI(u) {
            const loginDiv=document.getElementById("login-container"), userDiv=document.getElementById("user-info");
            if(loginDiv&&userDiv){ loginDiv.style.display="none"; userDiv.style.display="flex"; }
            const nameSpan=document.getElementById("user-name"), avatar=document.getElementById("user-avatar");
            if(nameSpan) nameSpan.textContent=u.name;
            if(avatar) avatar.src=u.picture;
        }
        function handleCredentialResponse(r) {
            const data=parseJwt(r.credential);
            localStorage.setItem("user",JSON.stringify({name:data.name,email:data.email,picture:data.picture,isLoggedIn:true}));
            updateUI(data);
        }
        function initGoogle() {
            if(typeof google==='undefined'){ setTimeout(initGoogle,100); return; }
            google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleCredentialResponse});
            const btn=document.getElementById("google-login-btn");
            if(btn) google.accounts.id.renderButton(btn,{theme:"outline",size:"large",text:"signin_with"});
            const user=JSON.parse(localStorage.getItem("user"));
            if(user&&user.isLoggedIn) updateUI(user);
        }
function applyFiltersFromUrl() {
    const urlParams = new URLSearchParams(window.location.search);
    const categoryFromUrl = urlParams.get('category');
    const priceFromUrl = urlParams.get('price');
    const searchFromUrl = urlParams.get('search');
    
    // Снимаем галочку "Все"
    const allCheckbox = document.querySelector('.filter-checkbox input[data-category="all"]');
    
    // Применяем категорию
    if (categoryFromUrl) {
        if (allCheckbox) allCheckbox.checked = false;
        const targetCheckbox = document.querySelector(`.filter-checkbox input[data-category="${categoryFromUrl}"]`);
        if (targetCheckbox) targetCheckbox.checked = true;
    }
    
    // Применяем фильтр по цене
    if (priceFromUrl) {
        if (allCheckbox && !categoryFromUrl) allCheckbox.checked = false;
        const priceCheckbox = document.querySelector(`.filter-checkbox input[data-price="${priceFromUrl}"]`);
        if (priceCheckbox) priceCheckbox.checked = true;
    }
    
    // Применяем поисковый запрос
    if (searchFromUrl) {
        const searchInput = document.getElementById("coursesSearchInput");
        if (searchInput) {
            searchInput.value = decodeURIComponent(searchFromUrl);
        }
    }
    
    renderAllCourses();
}
        document.addEventListener("DOMContentLoaded", () => { initGoogle(); setupFilters(); applyFiltersFromUrl(); });
    </script>
</body>

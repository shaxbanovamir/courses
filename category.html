<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Категория - Librarium</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>

    <div class="top-bar" style="padding: 0.5rem 2rem;">
        <div class="top-bar-content">
            <div class="logo" style="font-size: 1.1rem;">📚 Librarium</div>
            <div class="top-nav">
                <a href="index.html">Главная</a>
                <a href="index.html#courses">Курсы</a>
                <a href="index.html#about">О компании</a>
                <a href="index.html#services">Услуги</a>
                <a href="index.html#contact">Контакты</a>
            </div>
            <div id="login-container">
                <div id="google-login-btn"></div>
            </div>
            <div id="user-info" style="display: none; align-items: center; gap: 10px;">
                <span id="user-name" style="cursor: pointer;" onclick="window.location.href='profile.html'"></span>
                <img id="user-avatar" width="28" height="28" style="border-radius: 50%; cursor: pointer;" onclick="window.location.href='profile.html'">
            </div>
        </div>
    </div>

    <section class="category-section">
        <div class="category-container">
            <h1 id="categoryTitle" class="category-title"></h1>
            <div id="categoryCourses" class="courses-grid"></div>
        </div>
    </section>

    <footer>
        <p>© 2025 Librarium — все курсы предоставлены в открытом доступе их авторами.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
